logging:
  charset:
    console: UTF-8
    file: UTF-8

server:
  port: ${GATEWAY_SERVICE_PORT:8090}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:../../.env[.properties]
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        register-enabled: ${NACOS_REGISTER_ENABLED:true}
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        username: ${NACOS_USERNAME:}
        password: ${NACOS_PASSWORD:}
    gateway:
      server:
        webmvc:
          routes:
            - id: knowledge-service
              uri: ${GATEWAY_KNOWLEDGE_ROUTE_URI:http://localhost:8081}
              predicates:
                - Path=/api/knowledgebase/**,/api/rag-chat/**
            - id: user-service
              uri: ${GATEWAY_USER_ROUTE_URI:http://localhost:8082}
              predicates:
                - Path=/api/auth/**,/api/users/**
            - id: resume-service
              uri: ${GATEWAY_RESUME_ROUTE_URI:http://localhost:8083}
              predicates:
                - Path=/api/resumes,/api/resumes/**
              filters:
                - Retry=2
            - id: job-service
              uri: ${GATEWAY_JOB_ROUTE_URI:http://localhost:8084}
              predicates:
                - Path=/api/jobs,/api/jobs/**,/api/job-matches,/api/job-matches/**,/api/career-reports,/api/career-reports/**,/api/resume-improvement-plans,/api/resume-improvement-plans/**
              filters:
                - Retry=2
            - id: interview-service
              uri: ${GATEWAY_INTERVIEW_ROUTE_URI:http://localhost:8085}
              predicates:
                - Path=/api/interview,/api/interview/**,/api/interview-schedule,/api/interview-schedule/**
              filters:
                - Retry=2
            - id: careerai-app
              uri: ${GATEWAY_APP_ROUTE_URI:http://localhost:8080}
              predicates:
                - Path=/api/**,/actuator/**,/swagger-ui/**,/v3/api-docs/**
              filters:
                - Retry=2

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
