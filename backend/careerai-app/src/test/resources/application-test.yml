# Test Profile Configuration
# 测试环境配置文件

spring:
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        enabled: false
        register-enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  redis:
    redisson:
      config: |
        singleServerConfig:
          address: "redis://localhost:6379"
          database: 0

  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: test-api-key
      chat:
        options:
          model: qwen3.5-flash
          temperature: 0.2
      embedding:
        options:
          model: text-embedding-v3
    retry:
      max-attempts: 1
      on-client-errors: false
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        initialize-schema: false
        remove-existing-vector-store-table: false

app:
  ai:
    default-provider: dashscope
    security:
      api-key-encryption-key: test-provider-api-key-encryption-key
    providers:
      dashscope:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        api-key: test-api-key
        model: qwen3.5-flash
      lmstudio:
        base-url: http://localhost:1234
        api-key: lm-studio
        model: qwen2.5-7b-instruct
    structured-max-attempts: 2
    structured-include-last-error: true
    rag:
      rewrite:
        enabled: true
      search:
        short-query-length: 4
        topk-short: 20
        topk-medium: 12
        topk-long: 8
        min-score-short: 0.18
        min-score-default: 0.28
  interview:
    follow-up-count: 1
    evaluation:
      batch-size: 8
  resume:
    upload-dir: ${java.io.tmpdir}/careerai/resumes
    allowed-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain

  storage:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: careerai
    region: us-east-1
    auto-create-bucket: false

  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:80
